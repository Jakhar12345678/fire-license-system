<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire License Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Fire License Management Dashboard</h1>
        
        <div class="form-container">
            <h2 id="form-title">Add New License Record</h2>
            <form id="licenseForm" enctype="multipart/form-data">
                <input type="hidden" id="licenseId">
                
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required placeholder="Enter full name">
                </div>

                <div class="form-group">
                    <label for="mobile">Mobile Number:</label>
                    <input type="text" id="mobile" name="mobile" required placeholder="Enter 10-digit mobile number">
                </div>

                <div class="form-group">
                    <label for="location">Location:</label>
                    <input type="text" id="location" name="location" required placeholder="Enter area/city">
                </div>

                <div class="form-group">
                    <label for="address">Full Address:</label>
                    <input type="text" id="address" name="address" required placeholder="Enter complete address">
                </div>

                <div class="form-group">
                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" name="quantity" required placeholder="Enter quantity">
                </div>

                <div class="form-group">
                    <label for="expiryDate">Expiry Date:</label>
                    <input type="date" id="expiryDate" name="expiryDate" required>
                </div>

                <div class="form-group">
                    <label for="work">Work Description (Manually):</label>
                    <input type="text" id="work" name="work" placeholder="Enter work details manually...">
                </div>

                <div class="form-group">
                    <label for="photos">Upload Photos (Max 5):</label>
                    <input type="file" id="photos" name="photos" multiple accept="image/*">
                </div>

                <button type="submit" id="submitBtn">Save Record</button>
                <button type="button" id="cancelBtn" style="display:none; background-color: #666;">Cancel Edit</button>
            </form>
        </div>

        <hr>

        <h2>Saved Records (Sorted by Expiry Date)</h2>
        <div id="recordsList" class="records-grid">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
